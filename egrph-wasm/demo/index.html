<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>egrph — Graph Database Demo</title>
  <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"
          integrity="sha384-IWROdLKRsN1UuJywMlWl7/blXQ8GEooN2n7dzTxfEPd7ybYIKCUJ2Ol/1Gpf3YV4"
          crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242736;
      --border: #2e3247;
      --accent: #6c8ef7;
      --accent2: #a78bfa;
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      font-family: var(--font-mono);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .badge {
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: 12px;
      font-family: var(--font-mono);
    }

    .header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }

    .stats { display: flex; gap: 16px; font-size: 13px; font-family: var(--font-mono); }
    .stat { display: flex; align-items: center; gap: 6px; color: var(--text-muted); }
    .stat-value { color: var(--accent); font-weight: 600; }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 260px 1fr;
      overflow: hidden;
      height: calc(100vh - 57px);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sidebar-section h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .example-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-bottom: 6px;
      transition: border-color 0.15s, background 0.15s;
      font-family: var(--font-mono);
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .example-btn:hover { border-color: var(--accent); background: #1e2235; }

    .example-label {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 3px;
    }

    .reset-btn {
      width: 100%;
      padding: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: border-color 0.15s, color 0.15s;
    }
    .reset-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Workspace ── */
    .workspace {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-area {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .editor-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .run-btn {
      padding: 7px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s;
    }
    .run-btn:hover { opacity: 0.85; }
    .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: var(--accent); }

    .shortcut-hint { font-size: 11px; color: var(--text-muted); }
    kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: var(--font-mono);
      font-size: 10px;
    }

    /* ── Bottom: tabs + panels ── */
    .bottom-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      padding: 0 16px;
      gap: 0;
    }

    .tab-btn {
      padding: 10px 16px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-meta {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }

    .panel {
      flex: 1;
      overflow: auto;
      display: none;
    }
    .panel.active { display: flex; flex-direction: column; }

    /* Results panel */
    .results-inner {
      padding: 16px;
    }

    .results-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .result-meta { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); }

    .result-tag { font-size: 11px; padding: 1px 8px; border-radius: 10px; font-family: var(--font-mono); }
    .tag-ok  { background: rgba(52,211,153,0.15); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
    .tag-err { background: rgba(248,113,113,0.15); color: var(--red);   border: 1px solid rgba(248,113,113,0.3); }
    .tag-empty { background: rgba(251,191,36,0.1); color: var(--yellow); border: 1px solid rgba(251,191,36,0.2); }

    .result-table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; font-family: var(--font-mono); }
    th {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      color: var(--text);
      vertical-align: top;
      max-width: 400px;
    }
    tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    tr:hover td { background: rgba(108,142,247,0.06); }

    .null-val { color: var(--text-muted); font-style: italic; }

    .error-box {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--red);
      padding: 12px 16px;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.5;
    }
    .empty-box {
      background: rgba(251,191,36,0.05);
      border: 1px dashed rgba(251,191,36,0.25);
      color: var(--yellow);
      padding: 20px;
      border-radius: 6px;
      text-align: center;
      font-size: 13px;
    }
    .welcome-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.7;
    }
    .welcome-box p + p { margin-top: 8px; }

    .loading-box {
      color: var(--text-muted);
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .object-cell {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      display: inline-block;
      max-width: 340px;
      overflow-x: auto;
      white-space: pre;
    }
    .string-val { color: #86efac; }
    .number-val { color: #93c5fd; }
    .bool-val   { color: #fca5a5; }

    /* Graph panel */
    #cy {
      flex: 1;
      background: var(--bg);
    }

    .graph-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* Fit button */
    .fit-btn {
      padding: 4px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      transition: border-color 0.15s, color 0.15s;
    }
    .fit-btn:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 700px) {
      main { grid-template-columns: 1fr; }
      .sidebar { max-height: 200px; overflow-y: auto; }
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">egrph</span>
    <span class="badge">WASM</span>
    <div class="header-right">
      <div class="stats">
        <span class="stat">Nodes: <span class="stat-value" id="node-count">—</span></span>
        <span class="stat">Edges: <span class="stat-value" id="edge-count">—</span></span>
      </div>
    </div>
  </header>

  <main>
    <div class="sidebar">
      <div class="sidebar-section">
        <h3>Examples</h3>
        <div id="examples-list"></div>
      </div>
      <div class="sidebar-section">
        <h3>Database</h3>
        <button class="reset-btn" id="reset-btn">Reset graph</button>
      </div>
    </div>

    <div class="workspace">
      <div class="editor-area">
        <div class="editor-header">
          <span class="editor-label">Cypher Query</span>
          <div style="display:flex;align-items:center;gap:10px;">
            <span class="shortcut-hint"><kbd>Ctrl</kbd>+<kbd>Enter</kbd> to run</span>
            <button class="run-btn" id="run-btn" disabled>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M2 1.5l8 4.5-8 4.5z"/></svg>
              Run
            </button>
          </div>
        </div>
        <textarea id="query-input" rows="4" placeholder="MATCH (n) RETURN n LIMIT 5" spellcheck="false"></textarea>
      </div>

      <div class="bottom-area">
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="results">Results</button>
          <button class="tab-btn" data-tab="graph">Graph</button>
          <div class="tab-meta">
            <span id="result-tag"></span>
            <span class="result-meta" id="result-meta"></span>
            <button class="fit-btn" id="fit-btn" style="display:none">Fit</button>
          </div>
        </div>

        <div class="panel active" id="panel-results">
          <div class="results-inner">
            <div id="results-content">
              <div class="loading-box">
                <div class="spinner"></div>
                Loading WASM module…
              </div>
            </div>
          </div>
        </div>

        <div class="panel" id="panel-graph">
          <div id="cy"></div>
          <div class="graph-empty" id="graph-empty" style="display:none">
            No nodes in the graph yet.
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import init, { WasmGraph } from '../pkg/egrph_wasm.js';

    const EXAMPLES = [
      {
        label: "Create nodes",
        query: `CREATE (:Person {name: "Alice", age: 30})
CREATE (:Person {name: "Bob", age: 25})
CREATE (:Person {name: "Carol", age: 35})`
      },
      {
        label: "Create relationships",
        query: `MATCH (a:Person {name: "Alice"}), (b:Person {name: "Bob"})
CREATE (a)-[:KNOWS]->(b)`
      },
      {
        label: "Match all nodes",
        query: `MATCH (n:Person) RETURN n.name, n.age ORDER BY n.age`
      },
      {
        label: "Filter with WHERE",
        query: `MATCH (p:Person)
WHERE p.age >= 30
RETURN p.name, p.age`
      },
      {
        label: "Match relationships",
        query: `MATCH (a:Person)-[r:KNOWS]->(b:Person)
RETURN a.name AS from, b.name AS to, type(r) AS rel`
      },
      {
        label: "Return node object",
        query: `MATCH (p:Person {name: "Alice"})
RETURN p`
      },
      {
        label: "Count & aggregate",
        query: `MATCH (p:Person)
RETURN count(p) AS total, avg(p.age) AS avg_age`
      },
      {
        label: "LIMIT / SKIP",
        query: `MATCH (p:Person)
RETURN p.name
ORDER BY p.name
SKIP 1 LIMIT 2`
      },
    ];

    // ── Label → color palette ──────────────────────────────────────────────
    const PALETTE = [
      '#6c8ef7', '#a78bfa', '#34d399', '#f87171',
      '#fbbf24', '#38bdf8', '#fb923c', '#e879f9',
    ];
    const labelColors = new Map();
    let paletteIdx = 0;
    function colorForLabel(label) {
      if (!labelColors.has(label)) {
        labelColors.set(label, PALETTE[paletteIdx % PALETTE.length]);
        paletteIdx++;
      }
      return labelColors.get(label);
    }

    // ── Cytoscape setup ────────────────────────────────────────────────────
    const cy = cytoscape({
      container: document.getElementById('cy'),
      style: [
        {
          selector: 'node',
          style: {
            'background-color': 'data(color)',
            'label': 'data(displayLabel)',
            'color': '#fff',
            'text-valign': 'center',
            'text-halign': 'center',
            'font-size': '11px',
            'font-family': 'ui-monospace, monospace',
            'width': 48,
            'height': 48,
            'text-wrap': 'wrap',
            'text-max-width': '60px',
            'border-width': 2,
            'border-color': 'data(borderColor)',
          }
        },
        {
          selector: 'node:selected',
          style: {
            'border-width': 3,
            'border-color': '#fff',
          }
        },
        {
          selector: 'edge',
          style: {
            'width': 2,
            'line-color': '#4a5568',
            'target-arrow-color': '#4a5568',
            'target-arrow-shape': 'triangle',
            'curve-style': 'bezier',
            'label': 'data(label)',
            'font-size': '10px',
            'font-family': 'ui-monospace, monospace',
            'color': '#8892a4',
            'text-background-color': '#0f1117',
            'text-background-opacity': 1,
            'text-background-padding': '2px',
          }
        },
        {
          selector: 'edge:selected',
          style: {
            'line-color': '#6c8ef7',
            'target-arrow-color': '#6c8ef7',
            'color': '#e2e8f0',
          }
        },
      ],
      layout: { name: 'preset' },
      wheelSensitivity: 0.3,
    });

    // ── Tab switching ──────────────────────────────────────────────────────
    const fitBtn = document.getElementById('fit-btn');
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
        fitBtn.style.display = btn.dataset.tab === 'graph' ? '' : 'none';
        if (btn.dataset.tab === 'graph') cy.resize();
      });
    });
    fitBtn.addEventListener('click', () => cy.fit(undefined, 32));

    // ── Graph refresh ──────────────────────────────────────────────────────
    function refreshGraph() {
      if (!graph) return;

      let allNodes = [], allEdges = [];
      try {
        const nodesJson = graph.execute('MATCH (n) RETURN n');
        allNodes = JSON.parse(nodesJson);
      } catch (_) {}
      try {
        const edgesJson = graph.execute('MATCH ()-[r]->() RETURN r');
        allEdges = JSON.parse(edgesJson);
      } catch (_) {}

      const elements = [];

      for (const row of allNodes) {
        const n = row.n;
        const label = (n._labels && n._labels[0]) || '';
        const name = (n._properties && n._properties.name) || label || n._id;
        const color = colorForLabel(label);
        elements.push({
          data: {
            id: n._id,
            displayLabel: name + (label ? '\n:' + label : ''),
            nodeLabel: label,
            color,
            borderColor: color,
          }
        });
      }

      for (const row of allEdges) {
        const r = row.r;
        elements.push({
          data: {
            id: 'e' + r._id,
            source: r._src,
            target: r._dst,
            label: r._type,
          }
        });
      }

      const graphEmpty = document.getElementById('graph-empty');
      if (elements.filter(e => !e.data.source).length === 0) {
        cy.elements().remove();
        graphEmpty.style.display = '';
        return;
      }
      graphEmpty.style.display = 'none';

      cy.elements().remove();
      cy.add(elements);
      cy.layout({
        name: 'cose',
        animate: true,
        animationDuration: 400,
        nodeRepulsion: 6000,
        idealEdgeLength: 120,
        fit: true,
        padding: 32,
      }).run();
    }

    // ── State ──────────────────────────────────────────────────────────────
    let graph = null;

    async function main() {
      await init();
      graph = new WasmGraph();
      updateStats();

      document.getElementById('run-btn').disabled = false;
      showWelcome();
      buildExamples();
      refreshGraph();

      document.getElementById('run-btn').addEventListener('click', runQuery);
      document.getElementById('query-input').addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          runQuery();
        }
      });

      document.getElementById('reset-btn').addEventListener('click', () => {
        graph = new WasmGraph();
        labelColors.clear();
        paletteIdx = 0;
        updateStats();
        showWelcome();
        refreshGraph();
      });
    }

    function updateStats() {
      document.getElementById('node-count').textContent = graph.nodeCount();
      document.getElementById('edge-count').textContent = graph.edgeCount();
    }

    function buildExamples() {
      const container = document.getElementById('examples-list');
      EXAMPLES.forEach(ex => {
        const wrap = document.createElement('div');
        const label = document.createElement('div');
        label.className = 'example-label';
        label.textContent = ex.label;
        const btn = document.createElement('button');
        btn.className = 'example-btn';
        btn.textContent = ex.query;
        btn.addEventListener('click', () => {
          document.getElementById('query-input').value = ex.query;
          document.getElementById('query-input').focus();
        });
        wrap.appendChild(label);
        wrap.appendChild(btn);
        container.appendChild(wrap);
      });
    }

    function showWelcome() {
      document.getElementById('results-content').innerHTML = `
        <div class="welcome-box">
          <p>Graph is <strong>empty</strong>. Start by clicking <em>Create nodes</em> in the sidebar.</p>
          <p>Run examples in order: create nodes → create relationships → match and query.</p>
          <p>Press <strong>Run</strong> or <kbd>Ctrl</kbd>+<kbd>Enter</kbd> to execute. Use <strong>Reset graph</strong> to start over.</p>
        </div>`;
      document.getElementById('result-tag').innerHTML = '';
      document.getElementById('result-meta').textContent = '';
    }

    function runQuery() {
      const query = document.getElementById('query-input').value.trim();
      if (!query || !graph) return;

      const t0 = performance.now();
      let rows, error;
      try {
        const json = graph.execute(query);
        rows = JSON.parse(json);
        updateStats();
        refreshGraph();
      } catch (e) {
        error = String(e);
      }
      const elapsed = (performance.now() - t0).toFixed(1);

      const tagEl  = document.getElementById('result-tag');
      const metaEl = document.getElementById('result-meta');
      const content = document.getElementById('results-content');

      if (error) {
        tagEl.innerHTML = `<span class="result-tag tag-err">Error</span>`;
        metaEl.textContent = '';
        content.innerHTML = `<div class="error-box">${escHtml(error)}</div>`;
        return;
      }

      metaEl.textContent = `${elapsed} ms`;

      if (rows.length === 0) {
        tagEl.innerHTML = `<span class="result-tag tag-empty">No rows</span>`;
        content.innerHTML = `<div class="empty-box">Query executed successfully — no rows returned.</div>`;
        return;
      }

      tagEl.innerHTML = `<span class="result-tag tag-ok">${rows.length} row${rows.length !== 1 ? 's' : ''}</span>`;

      const cols = Object.keys(rows[0]);
      const thead = `<tr>${cols.map(c => `<th>${escHtml(c)}</th>`).join('')}</tr>`;
      const tbody = rows.map(row =>
        `<tr>${cols.map(col => `<td>${renderValue(row[col])}</td>`).join('')}</tr>`
      ).join('');
      content.innerHTML = `<div class="result-table-wrap"><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
    }

    function renderValue(v) {
      if (v === null || v === undefined) return `<span class="null-val">null</span>`;
      if (typeof v === 'boolean') return `<span class="bool-val">${v}</span>`;
      if (typeof v === 'number')  return `<span class="number-val">${v}</span>`;
      if (typeof v === 'string')  return `<span class="string-val">&quot;${escHtml(v)}&quot;</span>`;
      if (typeof v === 'object')  return `<span class="object-cell">${escHtml(JSON.stringify(v, null, 2))}</span>`;
      return escHtml(String(v));
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    main().catch(err => {
      document.getElementById('results-content').innerHTML =
        `<div class="error-box">Failed to initialize WASM: ${escHtml(String(err))}</div>`;
    });
  </script>
</body>
</html>
